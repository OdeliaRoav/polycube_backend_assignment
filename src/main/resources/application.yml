spring:
  datasource: #H2 인메모리 사용
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa: # 테이블 자동 생성
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true #SQL 로그 자동 출력

logging:
  level:
    org.hibernate.SQL: debug